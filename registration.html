<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Mela-Plus — Registration | Mikhelah Metcalfe</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="top-brand-bar">
        <div class="bar-container">
            <div class="bar-left"></div>
            
            <!-- Centered brand name -->
            <div class="brand-center">
                <h2 class="mela-logo">Mela-Plus</h2>
            </div>
            
            <!-- Right-aligned action links (Cart, Register, Login) -->
            <div class="actions-right">
                <a href="registration.html" class="action-btn register-btn nav-link active">
                    <span>Register</span>
                </a>
                <a href="login.html" class="action-btn login-btn">
                    <span>Login</span>
                </a>
                    <a href="cart.html" class="action-btn cart-btn">
                    <span>Cart</span>
                </a>
            </div>
        </div>
    </div>

    <!-- navigation bar (centered links) -->
    <nav class="navbar-full">
        <div class="nav-inner">
            <ul class="nav-list">
                <li><a href="index.html" class="nav-link">Home</a></li>
                <li><a href="product.html" class="nav-link">Products</a></li>
                <li><a href="about.html" class="nav-link">About Us</a></li>
            </ul>
        </div>
    </nav>




  <div class="container">
    <!-- Title section -->
    <div class="title">Registration</div>
    <div class="content">
      <!-- Registration form -->
      <form action="#">
        <div class="user-details">
          <!-- Input for Full Name -->
          <div class="input-box">
            <span class="details">Full Name</span>
            <input type="text" placeholder="Enter your name" required>
          </div>
          <!-- Input for Username -->
          <div class="input-box">
            <span class="details">Username</span>
            <input type="text" placeholder="Enter your username" required>
          </div>
          <!-- Input for Email -->
          <div class="input-box">
            <span class="details">Email</span>
            <input type="text" placeholder="Enter your email" required>
          </div>
          <!-- Input for Phone Number -->
          <div class="input-box">
            <span class="details">Phone Number</span>
            <input type="text" placeholder="Enter your number" required>
          </div>
          <!-- Input for Password -->
          <div class="input-box">
            <span class="details">Password</span>
            <input type="text" placeholder="Enter your password" required>
          </div>
          <!-- Input for Confirm Password -->
          <div class="input-box">
            <span class="details">Confirm Password</span>
            <input type="text" placeholder="Confirm your password" required>
          </div>
        </div>
        <div class="gender-details">
          <!-- Radio buttons for gender selection -->
          <input type="radio" name="gender" id="dot-1">
          <input type="radio" name="gender" id="dot-2">
          <input type="radio" name="gender" id="dot-3">
          <span class="gender-title">Gender</span>
          <div class="category">
            <!-- Label for Male -->
            <label for="dot-1">
              <span class="dot one"></span>
              <span class="gender">Male</span>
            </label>
            <!-- Label for Female -->
            <label for="dot-2">
              <span class="dot two"></span>
              <span class="gender">Female</span>
            </label>
            <!-- Label for Prefer not to say -->
            <label for="dot-3">
              <span class="dot three"></span>
              <span class="gender">Prefer not to say</span>
            </label>
          </div>
        </div>
        <!-- Submit button -->
        <div class="button">
          <input type="submit" value="Register">
        </div>
      </form>
    </div>
  </div>
</body>
</html>
