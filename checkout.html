<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Mela-Plus — Checkout | Mikhelah Metcalfe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

   <!-- Top bar: brand centered + action links right-aligned -->
    <div class="top-brand-bar">
        <div class="bar-container">
            <div class="bar-left"></div>
            
            <!-- Centered brand name -->
            <div class="brand-center">
                <h2 class="mela-logo">Mela-Plus</h2>
            </div>
            
            <!-- Right-aligned action links (Cart, Register, Login) -->
            <div class="actions-right">
                <a href="registration.html" class="action-btn register-btn">
                    <span>Register</span>
                </a>
                <a href="login.html" class="action-btn login-btn">
                    <span>Login</span>
                </a>
                <a href="cart.html" class="action-btn cart-btn">
                    <span>Cart</span>
                </a>
            </div>
        </div>
    </div>

    <!-- navigation bar (centered links) -->
    <nav class="navbar-full">
        <div class="nav-inner">
            <ul class="nav-list">
                <li><a href="ai-2.html" class="nav-link">Home</a></li>
                <li><a href="product.html" class="nav-link">Products</a></li>
                <li><a href="about.html" class="nav-link">About Us</a></li>
            </ul>
        </div>
    </nav>

    <!-- Checkout Main Content -->
    <main class="checkout-main">
        <div class="page-header">
            <h1>Secure Checkout</h1>
            <p>Complete your beauty purchase</p>
            <div class="page-divider"></div>
        </div>

        <div class="checkout-container">
            <!-- Order Summary Section -->
            <div class="order-summary">
                <h2><i class="fas fa-receipt"></i> Order Summary</h2>
                <div id="orderItemsList" class="order-items-list"></div>
                <div class="summary-details">
                    <div class="summary-row">
                        <span>Subtotal:</span>
                        <span id="subtotal">$0.00</span>
                    </div>
                    <div class="summary-row">
                        <span>Discount (10% off):</span>
                        <span id="discount">-$0.00</span>
                    </div>
                    <div class="summary-row">
                        <span>Tax (15%):</span>
                        <span id="tax">$0.00</span>
                    </div>
                    <div class="summary-row total">
                        <span>Total:</span>
                        <span id="total">$0.00</span>
                    </div>
                </div>
            </div>

            <!-- Shipping Information Form -->
            <div class="shipping-form">
                <h2><i class="fas fa-truck"></i> Shipping Details</h2>
                <form id="checkoutForm">
                    <div class="form-group">
                        <label><i class="fas fa-user"></i> Full Name</label>
                        <input type="text" id="fullName" placeholder="Enter your full name" required>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-envelope"></i> Email Address</label>
                        <input type="email" id="email" placeholder="Enter your email" required>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-phone"></i> Phone Number</label>
                        <input type="tel" id="phone" placeholder="Enter your phone number" required>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-map-marker-alt"></i> Shipping Address</label>
                        <input type="text" id="address" placeholder="Street address" required>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>City</label>
                            <input type="text" id="city" placeholder="City" required>
                        </div>
                        <div class="form-group">
                            <label>State</label>
                            <input type="text" id="state" placeholder="State" required>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Zip Code</label>
                            <input type="text" id="zip" placeholder="Zip code" required>
                        </div>
                        <div class="form-group">
                            <label>Country</label>
                            <select id="country" required>
                                <option value="">Select Country</option>
                                <option value="USA">United States</option>
                                <option value="Canada">Canada</option>
                                <option value="UK">United Kingdom</option>
                                <option value="Jamaica">Jamaica</option>
                            </select>
                        </div>
                    </div>

                    <div class="payment-methods">
                        <label class="payment-option">
                            <input type="radio" name="payment" value="credit-card" checked>
                            <i class="fab fa-cc-visa"></i> Credit Card
                        </label>
                        <label class="payment-option">
                            <input type="radio" name="payment" value="paypal">
                            <i class="fab fa-paypal"></i> PayPal
                        </label>
                        <label class="payment-option">
                            <input type="radio" name="payment" value="apple-pay">
                            <i class="fab fa-apple-pay"></i> Apple Pay
                        </label>
                    </div>
                    
                    <div class="checkout-actions">
                        <button type="button" class="btn-cancel" id="cancelBtn">
                            <i class="fas fa-times"></i> Cancel
                        </button>
                        <button type="submit" class="btn-confirm">
                            <i class="fas fa-check"></i> Confirm Order
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
